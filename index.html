<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civic Awareness Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="brand">
                <div class="logo">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                    </svg>
                </div>
                <div>
                    <h1>Civic AI</h1>
                    <p>Your Intelligent Electoral Assistant</p>
                </div>
            </div>
            <div class="status">
                <span class="dot"></span> Online
            </div>
        </header>

        <main class="chat-container" id="chat-container">
            <div class="message assistant">
                <div class="message-content">
                    Hello! I am your <strong>Civic Awareness Assistant</strong>. I'm here to help you understand the election process, check your voter eligibility, and guide you towards relevant government schemes. How can I help you today?
                </div>
            </div>
        </main>

        <div class="input-container">
            <form id="chat-form">
                <input type="text" id="user-input" placeholder="Type your message here... (e.g. 'I am 22 and studying BCA')" autocomplete="off" required>
                <button type="submit" id="send-btn">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </form>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
